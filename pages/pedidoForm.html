<!DOCTYPE html>
<html lang="pt">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Nome do Restaurante &#9679; pedido</title>
    </head>
    <body>
        <header id="Header">
            <h1 class="logo">Nome do Restaurante</h1>
            <h2 class="titulo">Configurando Pedido</h2>
        </header>

        <main>
            <form action="#" method="post">
              <section id="dadosCliente">
                <fieldset>
                  <legend>Dados do Cliente</legend>
                
                  <div class="clienteCampo">
                    <label for="nome">Nome:</label>
                    <input type="text" id="nome" name="Cliente-nome" placeholder="Insira seu nome completo" required>
                  </div>
                
                  <div class="clienteCampo">
                    <label for="cpf">CPF:</label>
                    <input type="tel" id="cpf" name="Cliente-cpf" maxlength="14" placeholder="000.000.000-00" required>
                  </div>

                  <div class="clienteCampo">
                    <label for="tel">Telefone:</label>
                    <input type="tel" id="tel" name="Cliente-tel" maxlength="15" placeholder="(00) 00000-0000" required>
                  </div>
                </fieldset> 
             </section>
             <section id="Endereco">
                <fieldset>
                    <legend>Endereço</legend>
                    
                    <div class="enderecoCampo">
                        <label for="cidade">Cidade:</label>
                        <input type="text" id="cidade" name="Cliente-city" required>
                    </div>

                    <div class="enderecoCampo">
                        <label for="rua">Rua:</label>
                        <input type="text" id="rua" name="Cliente-rua" required> 
                    </div>

                    <div class="enderecoCampo">
                        <label for="bairro">Bairro:</label>
                        <input type="text" id="bairro" name="Cliente-bairro" required>
                    </div>

                    <div class="enderecoCampo">
                        <label for="complemento">Complemento:</label>
                        <input type="text" id="complemento" name="Cliente-comp" required>
                    </div>

                    <div class="enderecoCampo">
                        <label for="numero">Número:</label>
                        <input type="text" id="numero" name="Cliente-num" required> 
                    </div>
                </fieldset>
             </section> 
             <section>
                <fieldset>
                    <legend>Pedido</legend>

                    <select class="Ped-Select">
                        <option value="">Selecione uma opção</option>
                        <option value="X-Bacon">X-Bacon</option>
                        <option value="X-Salada">X-Salada</option>
                        <option value="X-Frango">X-Frango</option> 
                    </select>
                    <input type="tel" class="qtd" maxlength="2">

                     <select class="Ped-Select">
                        <option value="">Selecione uma opção</option>
                        <option value="pizzaCalbr"> Pizza Calabresa</option>
                        <option value="pizzaFragCat">Pizza Frango com Catupiry</option>
                        <option value="pizzaPortug">Pizza Portuguesa</option>
                        <option value="pizzaVeget">Pizza Vegetariana</option>
                    </select>
                    <input type="tel" class="qtd" maxlength="2">

                    <select class="Ped-Select">
                        <option value="">Selecione uma opção</option>
                        <option value="Bat-Tradicional">Batata Frita Tradicional</option>
                        <option value="Bat-Cheddar">Batata com Cheddar e Bacon</option>
                    </select>
                    <input type="tel" class="qtd" maxlength="2">

                    <select class="Ped-Select">
                        <option value="">Selecione uma opção</option>
                        <option value="Guaraná Antarctica">Guaraná Antarctica</option>
                        <option value="cocaCola">Coca Cola</option>
                        <option value="sucoLaranja">Suco de laranja</option>
                        <option value="cha">Chá Gelado Mate Leão</option>
                    </select>
                    <input type="tel" class="qtd" maxlength="2"> 
                </fieldset>
                <fieldset>
                    <legend>Pagamento</legend>

                    <select class="Pag-Select">
                        <option value="">Selecione um tipo de pagamento</option>
                        <option value="dinheiro">Dinheiro</option>
                        <option value="pix">PIX</option>
                    </select>
                </fieldset>
             </section>

            </form>
        </main>
        <footer>
            <div class="rodape">
                <p>&copy; 2026 Nome do Restaurante - Todos os direitos reservados.</p>
                <p>Endereço: Rua dos Sabores, 123 - São Paulo/SP</p>
                <p>Horário de Funcionamento: Terça a Domingo, 18h às 23h</p>
            </div>
        </footer>
    </body>
</html>
